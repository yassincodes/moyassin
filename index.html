<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@moyassin</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            background-color: #f9f9f9;
            color: #333;
        }

        .content {
            text-align: center;
            max-width: 500px;
            padding: 20px;
        }

        .content h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .content p {
            font-size: 1rem;
            font-weight: 300;
            margin-bottom: 1.5rem;
            color: #555;
            line-height: 1.6;
        }

        .content .date {
            font-size: 0.9rem;
            font-weight: 400;
            color: #888;
            margin-bottom: 2rem;
        }

        .content a {
            font-size: 1rem;
            font-weight: 500;
            color: #007BFF;
            text-decoration: none;
            border: 1px solid #007BFF;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }

        .content a:hover {
            background-color: #007BFF;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>Navigating my school teaching job<br>while building JournalAI</h1>
        <p>Your AI companion that takes care of your boring teaching tasks.</p>
        <div class="date">Beta version release: 01.03.25</div>
        <a href="https://vimeo.com/976990722" target="_blank">See Prototype</a>
    </div>
</body>
</html>
