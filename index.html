<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>25 Days Lock In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Space Mono', monospace;
            background-color: #050505;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        /* Container */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }
        
        /* Background effects */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0, 255, 255, 0.05) 0%, transparent 70%);
            z-index: 1;
        }
        
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 2px,
                rgba(0, 240, 255, 0.02) 2px,
                rgba(0, 240, 255, 0.02) 4px
            );
            pointer-events: none;
            z-index: 2;
        }
        
        /* Logo */
        .logo {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #00f0ff, #ff00c8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 2rem;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }
        
        /* Main content */
        .main-content {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 1rem;
            margin-bottom: 3rem;
        }
        
        /* Title text */
        .title-container {
            position: relative;
            margin-bottom: 3rem;
            text-align: center;
        }
        
        .title-text {
            position: relative;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
            text-align: center;
            padding: 0.5rem 1rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #00f0ff, #ff00c8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.3);
        }
        
        .title-separator {
            color: #00f0ff;
            animation: pulse 2s infinite alternate;
        }
        
        @keyframes pulse {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        
        .subtitle {
            font-size: 1.2rem;
            text-align: center;
            margin-top: 1.5rem;
            color: rgba(255, 255, 255, 0.8);
            max-width: 700px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            position: relative;
            display: inline-block;
        }
        
        .subtitle::before {
            content: '[';
            color: #00f0ff;
            margin-right: 0.5rem;
            font-weight: bold;
        }
        
        .subtitle::after {
            content: ']';
            color: #ff00c8;
            margin-left: 0.5rem;
            font-weight: bold;
        }
        
        /* Countdown */
        .countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            width: 100%;
            max-width: 700px;
            margin-bottom: 3rem;
        }
        
        .countdown-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .countdown-value-container {
            position: relative;
            width: 100%;
        }
        
        .countdown-value-box {
            background-color: #0a0a0a;
            border: 1px solid rgba(0, 240, 255, 0.3);
            position: relative;
            z-index: 1;
            padding: 1rem;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.15);
        }
        
        .countdown-value {
            font-size: 3rem;
            font-weight: 700;
            color: white;
            text-align: center;
            width: 100%;
            position: relative;
        }
        
        .countdown-border {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background-color: #00f0ff;
            z-index: 2;
        }
        
        .countdown-label {
            font-size: 0.875rem;
            margin-top: 0.5rem;
            letter-spacing: 0.2em;
            color: rgba(0, 240, 255, 0.8);
        }
        
        /* Video section */
        .video-container {
            position: relative;
            width: 100%;
            max-width: 700px;
            margin-bottom: 3rem;
        }
        
        .video-wrapper {
            position: relative;
            aspect-ratio: 16 / 9;
            width: 100%;
            background-color: black;
            border: 1px solid rgba(0, 240, 255, 0.3);
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
        }
        
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .video-border-top {
            position: absolute;
            top: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(to right, transparent, #ff00c8, transparent);
        }
        
        .video-border-bottom {
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(to right, transparent, #00f0ff, transparent);
        }
        
        .video-caption {
            text-align: center;
            margin-top: 1.5rem;
            color: #00f0ff;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-size: 1rem;
        }
        
        /* Social links */
        .social-links {
            display: flex;
            gap: 2rem;
            margin-top: auto;
        }
        
        .social-link {
            color: rgba(0, 240, 255, 0.8);
            text-decoration: none;
            transition: color 0.3s, transform 0.3s;
            font-size: 1rem;
            letter-spacing: 0.1em;
            position: relative;
            padding: 0.5rem 1rem;
        }
        
        .social-link:first-child {
            color: rgba(0, 240, 255, 0.8);
        }
        
        .social-link:last-child {
            color: rgba(255, 0, 200, 0.8);
        }
        
        .social-link:first-child:hover {
            color: #00f0ff;
            transform: translateY(-2px);
        }
        
        .social-link:last-child:hover {
            color: #ff00c8;
            transform: translateY(-2px);
        }
        
        .social-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: currentColor;
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s ease;
        }
        
        .social-link:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .logo {
                font-size: 2.5rem;
            }
            
            .title-text {
                font-size: 1.3rem;
            }
            
            .subtitle {
                font-size: 1rem;
            }
            
            .countdown {
                gap: 1rem;
            }
            
            .countdown-value {
                font-size: 2.5rem;
            }
            
            .container {
                padding: 1.5rem;
            }
            
            .social-links {
                flex-direction: column;
                gap: 1rem;
                align-items: center;
            }
        }
        
        @media (max-width: 480px) {
            .logo {
                font-size: 2rem;
            }
            
            .title-text {
                font-size: 1rem;
                letter-spacing: 0.05em;
            }
            
            .subtitle {
                font-size: 0.9rem;
            }
            
            .countdown {
                gap: 0.5rem;
            }
            
            .countdown-value {
                font-size: 1.8rem;
            }
            
            .countdown-value-box {
                padding: 0.75rem;
            }
            
            .countdown-label {
                font-size: 0.7rem;
            }
            
            .video-caption {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="scanlines"></div>
    
    <div class="container">
        <div class="logo">@moyassin</div>
        
        <div class="main-content">
            <div class="title-container">
                <div class="title-text">
                    25 days lock in <span class="title-separator">⟁⟁⟁</span> from mars 12 till april 6
                </div>
                
                <div>
                    mission: build excellence
                </div>
            </div>
            
            <div class="countdown">
                <div class="countdown-item">
                    <div class="countdown-value-container">
                        <div class="countdown-value-box">
                            <div id="days" class="countdown-value">00</div>
                        </div>
                        <div class="countdown-border"></div>
                    </div>
                    <div class="countdown-label">DAYS</div>
                </div>
                
                <div class="countdown-item">
                    <div class="countdown-value-container">
                        <div class="countdown-value-box">
                            <div id="hours" class="countdown-value">00</div>
                        </div>
                        <div class="countdown-border"></div>
                    </div>
                    <div class="countdown-label">HOURS</div>
                </div>
                
                <div class="countdown-item">
                    <div class="countdown-value-container">
                        <div class="countdown-value-box">
                            <div id="minutes" class="countdown-value">00</div>
                        </div>
                        <div class="countdown-border"></div>
                    </div>
                    <div class="countdown-label">MIN</div>
                </div>
                
                <div class="countdown-item">
                    <div class="countdown-value-container">
                        <div class="countdown-value-box">
                            <div id="seconds" class="countdown-value">00</div>
                        </div>
                        <div class="countdown-border"></div>
                    </div>
                    <div class="countdown-label">SEC</div>
                </div>
            </div>
            
            <div class="video-container">
                <div class="video-wrapper">
                    <iframe 
                        src="https://www.youtube.com/embed/GC7ntrORW0w?autoplay=1&mute=1&loop=1&playlist=GC7ntrORW0w&controls=0&showinfo=0" 
                        title="Kanye West, Ty Dolla Sign - Stars (Live at UBS Arena, New York)" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen
                    ></iframe>
                    <div class="video-border-top"></div>
                    <div class="video-border-bottom"></div>
                </div>
                <div class="video-caption">A SONG FOR MY APRIL 7TH SELF</div>
            </div>
        </div>
        
        <div class="social-links">
            <a href="https://facebook.com/moyassin" class="social-link" target="_blank" rel="noopener noreferrer">
                fb.com/moyassin
            </a>
            <a href="https://tiktok.com/@moyassin" class="social-link" target="_blank" rel="noopener noreferrer">
                tiktok.com/@moyassin
            </a>
        </div>
    </div>
    
    <script>
        // Set the countdown date to April 6, 2025 at midnight
        const countdownDate = new Date("April 6, 2025 00:00:00").getTime();
        
        // Update the countdown every second
        const countdown = setInterval(function() {
            // Get current date and time
            const now = new Date().getTime();
            
            // Calculate the time remaining
            const distance = countdownDate - now;
            
            // Calculate days, hours, minutes, and seconds
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            
            // Display the results with leading zeros
            document.getElementById("days").innerHTML = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerHTML = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerHTML = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerHTML = seconds < 10 ? "0" + seconds : seconds;
            
            // If the countdown is finished, display a message
            if (distance < 0) {
                clearInterval(countdown);
                document.getElementById("days").innerHTML = "00";
                document.getElementById("hours").innerHTML = "00";
                document.getElementById("minutes").innerHTML = "00";
                document.getElementById("seconds").innerHTML = "00";
            }
        }, 1000);
    </script>
</body>
</html>
