<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@moyassin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Space Mono', monospace;
            background-color: #050505;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }
        
        /* Background effects */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.1;
            z-index: 1;
        }
        
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0, 255, 255, 0.1) 0%, transparent 70%);
            z-index: 2;
        }
        
        .matrix-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 3;
            opacity: 0.2;
        }
        
        .matrix-code {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 200%;
            background: linear-gradient(180deg, transparent, rgba(0, 240, 255, 0.2), transparent);
            animation: matrixRain 20s linear infinite;
        }
        
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 1px,
                rgba(0, 240, 255, 0.03) 1px,
                rgba(0, 240, 255, 0.03) 2px
            );
            pointer-events: none;
            z-index: 4;
            animation: scanline 8s linear infinite;
        }
        
        .glitch-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 200, 0.02);
            mix-blend-mode: overlay;
            pointer-events: none;
            z-index: 5;
            animation: glitch 0.2s infinite;
            opacity: 0;
        }
        
        /* Logo */
        .logo {
            font-size: 4rem;
            font-weight: 700;
            background: linear-gradient(to right, #00f0ff, #ff00c8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 2rem;
            animation: textShadow 1.5s infinite;
            position: relative;
        }
        
        /* Main content */
        .main-content {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 2rem;
            margin-bottom: 4rem;
        }
        
        /* March is for locking in */
        .march-text {
            position: relative;
            font-size: 2rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            font-weight: 700;
            text-align: center;
            padding: 0.5rem 1rem;
            margin-bottom: 3rem;
            z-index: 1;
        }
        
        .march-text span {
            background: linear-gradient(to right, #00f0ff, #ff00c8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            position: relative;
            z-index: 2;
        }
        
        .march-text::before, .march-text::after {
            content: 'march is for locking in';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: -1;
        }
        
        .march-text::before {
            color: #ff00c8;
            transform: translateX(-2px);
            opacity: 0.5;
            animation: glitch 0.3s infinite;
        }
        
        .march-text::after {
            color: #00f0ff;
            transform: translateX(2px);
            opacity: 0.5;
            animation: glitch 0.3s infinite reverse;
        }
        
        .march-glow {
            position: absolute;
            inset: 0;
            background: linear-gradient(to right, rgba(0, 240, 255, 0.2), rgba(255, 0, 200, 0.2));
            filter: blur(1rem);
            opacity: 0.5;
            transition: opacity 0.5s;
        }
        
        .march-text:hover .march-glow {
            opacity: 0.7;
        }
        
        /* Countdown */
        .countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            width: 100%;
            max-width: 800px;
            margin-bottom: 4rem;
        }
        
        .countdown-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .countdown-value-container {
            position: relative;
            width: 100%;
        }
        
        .countdown-glow {
            position: absolute;
            inset: -2px;
            background: linear-gradient(to right, #00f0ff, #ff00c8);
            opacity: 0.3;
            filter: blur(8px);
            transition: opacity 0.3s;
        }
        
        .countdown-value-container:hover .countdown-glow {
            opacity: 0.5;
        }
        
        .countdown-value-box {
            background-color: #0a0a0a;
            border: 1px solid rgba(0, 240, 255, 0.3);
            position: relative;
            z-index: 1;
            padding: 1rem;
        }
        
        .countdown-value {
            font-size: 3.5rem;
            font-weight: 700;
            color: white;
            text-align: center;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        
        .countdown-value::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent, rgba(0, 240, 255, 0.1), transparent);
            opacity: 0.7;
        }
        
        .countdown-border {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background-color: #00f0ff;
            z-index: 2;
        }
        
        .countdown-label {
            font-size: 0.875rem;
            margin-top: 0.5rem;
            letter-spacing: 0.2em;
            color: rgba(0, 240, 255, 0.8);
        }
        
        /* Video section */
        .video-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin-bottom: 3rem;
        }
        
        .video-glow {
            position: absolute;
            inset: -4px;
            background: linear-gradient(to right, #00f0ff, #ff00c8);
            opacity: 0.3;
            filter: blur(8px);
        }
        
        .video-wrapper {
            position: relative;
            aspect-ratio: 16 / 9;
            width: 100%;
            background-color: black;
            border: 1px solid rgba(0, 240, 255, 0.3);
            overflow: hidden;
        }
        
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .video-border-top {
            position: absolute;
            top: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(to right, transparent, #ff00c8, transparent);
        }
        
        .video-border-bottom {
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(to right, transparent, #00f0ff, transparent);
        }
        
        .video-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            border: 1px solid rgba(0, 240, 255, 0.2);
            z-index: 1;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7), transparent, rgba(0, 0, 0, 0.3));
        }
        
        .video-caption {
            text-align: center;
            margin-top: 1.5rem;
            color: #00f0ff;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-size: 1rem;
            position: relative;
            overflow: hidden;
        }
        
        .video-caption::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.4), transparent);
            animation: scanline 2s linear infinite;
        }
        
        /* Social links */
        .social-links {
            display: flex;
            gap: 2rem;
            margin-top: auto;
        }
        
        .social-link {
            color: rgba(0, 240, 255, 0.8);
            text-decoration: none;
            transition: color 0.3s, transform 0.3s;
            font-size: 1rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            position: relative;
            padding: 0.5rem 1rem;
        }
        
        .social-link:first-child {
            color: rgba(0, 240, 255, 0.8);
        }
        
        .social-link:last-child {
            color: rgba(255, 0, 200, 0.8);
        }
        
        .social-link:first-child:hover {
            color: #00f0ff;
            transform: translateY(-2px);
        }
        
        .social-link:last-child:hover {
            color: #ff00c8;
            transform: translateY(-2px);
        }
        
        .social-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: currentColor;
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s ease;
        }
        
        .social-link:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }
        
        /* Animations */
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        
        @keyframes textShadow {
            0% { text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75), -0.025em -0.05em 0 rgba(0, 255, 0, 0.75), 0.025em 0.05em 0 rgba(0, 0, 255, 0.75); }
            14% { text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.75), -0.025em -0.05em 0 rgba(0, 255, 0, 0.75), 0.025em 0.05em 0 rgba(0, 0, 255, 0.75); }
            15% { text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75), 0.025em 0.025em 0 rgba(0, 255, 0, 0.75), -0.05em -0.05em 0 rgba(0, 0, 255, 0.75); }
            49% { text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.75), 0.025em 0.025em 0 rgba(0, 255, 0, 0.75), -0.05em -0.05em 0 rgba(0, 0, 255, 0.75); }
            50% { text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75), 0.05em 0 0 rgba(0, 255, 0, 0.75), 0 -0.05em 0 rgba(0, 0, 255, 0.75); }
            99% { text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.75), 0.05em 0 0 rgba(0, 255, 0, 0.75), 0 -0.05em 0 rgba(0, 0, 255, 0.75); }
            100% { text-shadow: -0.025em 0 0 rgba(255, 0, 0, 0.75), -0.025em -0.025em 0 rgba(0, 255, 0, 0.75), -0.025em -0.05em 0 rgba(0, 0, 255, 0.75); }
        }
        
        @keyframes matrixRain {
            0% { top: -50%; }
            100% { top: 110%; }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .logo {
                font-size: 3rem;
            }
            
            .march-text {
                font-size: 1.5rem;
            }
            
            .countdown {
                gap: 1rem;
            }
            
            .countdown-value {
                font-size: 2.5rem;
            }
            
            .container {
                padding: 1.5rem;
            }
            
            .social-links {
                flex-direction: column;
                gap: 1rem;
                align-items: center;
            }
        }
        
        @media (max-width: 480px) {
            .logo {
                font-size: 2.5rem;
            }
            
            .march-text {
                font-size: 1.2rem;
                letter-spacing: 0.15em;
            }
            
            .countdown {
                gap: 0.5rem;
            }
            
            .countdown-value {
                font-size: 2rem;
            }
            
            .countdown-value-box {
                padding: 0.75rem;
            }
            
            .countdown-label {
                font-size: 0.7rem;
            }
            
            .video-caption {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <div class="bg-gradient"></div>
    <div class="matrix-container">
        <div class="matrix-code"></div>
    </div>
    <div class="scanlines"></div>
    <div class="glitch-overlay"></div>
    
    <div class="container">
        <div class="logo">@moyassin</div>
        
        <div class="main-content">
            <div class="march-text">
                <div class="march-glow"></div>
                <span>march is for locking in</span>
            </div>
            
            <div class="countdown">
                <div class="countdown-item">
                    <div class="countdown-value-container">
                        <div class="countdown-glow"></div>
                        <div class="countdown-value-box">
                            <div id="days" class="countdown-value">00</div>
                        </div>
                        <div class="countdown-border"></div>
                    </div>
                    <div class="countdown-label">DAYS</div>
                </div>
                
                <div class="countdown-item">
                    <div class="countdown-value-container">
                        <div class="countdown-glow"></div>
                        <div class="countdown-value-box">
                            <div id="hours" class="countdown-value">00</div>
                        </div>
                        <div class="countdown-border"></div>
                    </div>
                    <div class="countdown-label">HOURS</div>
                </div>
                
                <div class="countdown-item">
                    <div class="countdown-value-container">
                        <div class="countdown-glow"></div>
                        <div class="countdown-value-box">
                            <div id="minutes" class="countdown-value">00</div>
                        </div>
                        <div class="countdown-border"></div>
                    </div>
                    <div class="countdown-label">MIN</div>
                </div>
                
                <div class="countdown-item">
                    <div class="countdown-value-container">
                        <div class="countdown-glow"></div>
                        <div class="countdown-value-box">
                            <div id="seconds" class="countdown-value">00</div>
                        </div>
                        <div class="countdown-border"></div>
                    </div>
                    <div class="countdown-label">SEC</div>
                </div>
            </div>
            
            <div class="video-container">
                <div class="video-glow"></div>
                <div class="video-wrapper">
                    <iframe 
                        src="https://www.youtube.com/embed/ma1pD7ugMb8?si=fa0lHG8vg8q6ez2I&autoplay=1&mute=1&loop=1&playlist=ma1pD7ugMb8&controls=0&showinfo=0" 
                        title="Grimes - Genesis" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen
                    ></iframe>
                    <div class="video-overlay"></div>
                    <div class="video-border-top"></div>
                    <div class="video-border-bottom"></div>
                </div>
                <div class="video-caption">TRANSCEND THE SIMULATION</div>
            </div>
        </div>
        
        <div class="social-links">
            <a href="https://facebook.com/moyassin" class="social-link" target="_blank" rel="noopener noreferrer">
                fb.com/moyassin
            </a>
            <a href="https://tiktok.com/@moyassin" class="social-link" target="_blank" rel="noopener noreferrer">
                tiktok.com/@moyassin
            </a>
        </div>
    </div>
    
    <script>
        // Set the countdown date to April 1, 2025
        const countdownDate = new Date("April 1, 2025 00:00:00").getTime();
        
        // Update the countdown every second
        const countdown = setInterval(function() {
            // Get current date and time
            const now = new Date().getTime();
            
            // Calculate the time remaining
            const distance = countdownDate - now;
            
            // Calculate days, hours, minutes, and seconds
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            
            // Display the results with leading zeros
            document.getElementById("days").innerHTML = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerHTML = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerHTML = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerHTML = seconds < 10 ? "0" + seconds : seconds;
            
            // If the countdown is finished, display a message
            if (distance < 0) {
                clearInterval(countdown);
                document.getElementById("days").innerHTML = "00";
                document.getElementById("hours").innerHTML = "00";
                document.getElementById("minutes").innerHTML = "00";
                document.getElementById("seconds").innerHTML = "00";
            }
        }, 1000);
        
        // Occasionally trigger glitch effect
        setInterval(function() {
            const glitchOverlay = document.querySelector('.glitch-overlay');
            glitchOverlay.style.opacity = '0.3';
            
            setTimeout(function() {
                glitchOverlay.style.opacity = '0';
            }, 200);
        }, 5000);
    </script>
</body>
</html>
