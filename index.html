<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@moyassin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Space Mono', monospace;
            background-color: #050505;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        /* Container with improved spacing */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            padding: 3rem 2rem; /* Increased top/bottom padding */
            position: relative;
            z-index: 10;
            gap: 3rem; /* Added gap between main sections */
        }
        
        /* Background effects with improved opacity */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.15; /* Slightly increased */
            z-index: 1;
        }
        
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0, 255, 255, 0.15) 0%, transparent 70%); /* Enhanced glow */
            z-index: 2;
        }
        
        .matrix-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 3;
            opacity: 0.25; /* Slightly increased */
        }
        
        .matrix-code {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 200%;
            background: linear-gradient(180deg, transparent, rgba(0, 240, 255, 0.25), transparent);
            animation: matrixRain 20s linear infinite;
        }
        
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 1px,
                rgba(0, 240, 255, 0.03) 1px,
                rgba(0, 240, 255, 0.03) 2px
            );
            pointer-events: none;
            z-index: 4;
            animation: scanline 8s linear infinite;
        }
        
        .glitch-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 0, 200, 0.03); /* Slightly enhanced */
            mix-blend-mode: overlay;
            pointer-events: none;
            z-index: 5;
            animation: glitch 0.2s infinite;
            opacity: 0;
        }
        
        /* Logo with enhanced text shadow */
        .logo {
            font-size: 4.5rem; /* Increased size */
            font-weight: 700;
            background: linear-gradient(to right, #00f0ff, #ff00c8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 2.5rem; /* Increased spacing */
            animation: textShadow 1.5s infinite;
            position: relative;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.4); /* Added glow */
            letter-spacing: 0.05em; /* Added slight letter spacing */
        }
        
        /* Main content with improved spacing */
        .main-content {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4rem; /* Added gap between elements */
            margin-bottom: 4rem;
        }
        
        /* March is for locking in - enhanced */
        .march-text {
            position: relative;
            font-size: 2.2rem; /* Slightly increased */
            text-transform: uppercase;
            letter-spacing: 0.3em; /* Increased letter spacing */
            font-weight: 700;
            text-align: center;
            padding: 0.75rem 1.5rem; /* Increased padding */
            z-index: 1;
            margin-bottom: 1rem; /* Added space */
        }
        
        .march-text span {
            background: linear-gradient(to right, #00f0ff, #ff00c8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            position: relative;
            z-index: 2;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.3); /* Added glow */
        }
        
        .march-text::before, .march-text::after {
            content: 'march is for locking in';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: -1;
        }
        
        .march-text::before {
            color: #ff00c8;
            transform: translateX(-3px); /* Increased offset */
            opacity: 0.6; /* Increased visibility */
            animation: glitch 0.3s infinite;
        }
        
        .march-text::after {
            color: #00f0ff;
            transform: translateX(3px); /* Increased offset */
            opacity: 0.6; /* Increased visibility */
            animation: glitch 0.3s infinite reverse;
        }
        
        .march-glow {
            position: absolute;
            inset: -10px; /* Expanded glow area */
            background: linear-gradient(to right, rgba(0, 240, 255, 0.25), rgba(255, 0, 200, 0.25));
            filter: blur(1.5rem); /* Increased blur */
            opacity: 0.6;
            transition: opacity 0.5s;
        }
        
        .march-text:hover .march-glow {
            opacity: 0.8;
        }
        
        /* Countdown - enhanced spacing and effects */
        .countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem; /* Increased gap */
            width: 100%;
            max-width: 850px; /* Increased max width */
            margin: 1rem 0 2rem; /* Adjusted margins */
        }
        
        .countdown-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem; /* Added gap */
        }
        
        .countdown-value-container {
            position: relative;
            width: 100%;
            transition: transform 0.2s ease;
        }
        
        .countdown-value-container:hover {
            transform: translateY(-3px); /* Added hover effect */
        }
        
        .countdown-glow {
            position: absolute;
            inset: -4px; /* Expanded glow area */
            background: linear-gradient(to right, #00f0ff, #ff00c8);
            opacity: 0.35; /* Increased visibility */
            filter: blur(10px); /* Increased blur */
            transition: opacity 0.3s, filter 0.3s;
        }
        
        .countdown-value-container:hover .countdown-glow {
            opacity: 0.6;
            filter: blur(12px);
        }
        
        .countdown-value-box {
            background-color: rgba(10, 10, 10, 0.9); /* Added transparency */
            border: 1px solid rgba(0, 240, 255, 0.4); /* Enhanced border */
            position: relative;
            z-index: 1;
            padding: 1.25rem; /* Increased padding */
            transition: all 0.3s ease;
        }
        
        .countdown-value-container:hover .countdown-value-box {
            border-color: rgba(0, 240, 255, 0.7); /* Enhanced border on hover */
        }
        
        .countdown-value {
            font-size: 3.75rem; /* Increased size */
            font-weight: 700;
            color: white;
            text-align: center;
            width: 100%;
            position: relative;
            overflow: hidden;
            text-shadow: 0 0 5px rgba(0, 240, 255, 0.5); /* Added glow */
        }
        
        .countdown-value::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent, rgba(0, 240, 255, 0.15), transparent);
            opacity: 0.8;
        }
        
        .countdown-border {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px; /* Increased height */
            background: linear-gradient(to right, transparent, #00f0ff, transparent); /* Added gradient */
            z-index: 2;
        }
        
        .countdown-label {
            font-size: 0.95rem; /* Increased size */
            letter-spacing: 0.25em; /* Increased letter spacing */
            color: rgba(0, 240, 255, 0.85); /* Brighter color */
            font-weight: 700; /* Added weight */
        }
        
        /* Video section - enhanced */
        .video-container {
            position: relative;
            width: 100%;
            max-width: 850px; /* Increased max width */
            margin: 1rem 0 2rem; /* Adjusted spacing */
        }
        
        .video-glow {
            position: absolute;
            inset: -8px; /* Expanded glow area */
            background: linear-gradient(to right, #00f0ff, #ff00c8);
            opacity: 0.4; /* Increased visibility */
            filter: blur(12px); /* Increased blur */
            transition: opacity 0.3s, filter 0.3s;
        }
        
        .video-container:hover .video-glow {
            opacity: 0.55;
            filter: blur(15px);
        }
        
        .video-wrapper {
            position: relative;
            aspect-ratio: 16 / 9;
            width: 100%;
            background-color: black;
            border: 1px solid rgba(0, 240, 255, 0.4); /* Enhanced border */
            overflow: hidden;
            transition: border-color 0.3s;
        }
        
        .video-container:hover .video-wrapper {
            border-color: rgba(0, 240, 255, 0.7); /* Enhanced border on hover */
        }
        
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .video-border-top {
            position: absolute;
            top: -1px;
            left: 0;
            right: 0;
            height: 2px; /* Increased height */
            background: linear-gradient(to right, transparent, #ff00c8, transparent);
        }
        
        .video-border-bottom {
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px; /* Increased height */
            background: linear-gradient(to right, transparent, #00f0ff, transparent);
        }
        
        .video-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            border: 1px solid rgba(0, 240, 255, 0.3); /* Enhanced border */
            z-index: 1;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7), transparent, rgba(0, 0, 0, 0.3));
            box-shadow: inset 0 0 30px rgba(0, 240, 255, 0.1); /* Added inner glow */
        }
        
        .video-caption {
            text-align: center;
            margin-top: 1.75rem; /* Increased spacing */
            color: #00f0ff;
            font-weight: 700; /* Increased weight */
            letter-spacing: 0.25em; /* Increased letter spacing */
            text-transform: uppercase;
            font-size: 1.1rem; /* Increased size */
            position: relative;
            overflow: hidden;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.4); /* Added glow */
        }
        
        .video-caption::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.5), transparent);
            animation: scanline 2s linear infinite;
        }
        
        /* Social links - enhanced */
        .social-links {
            display: flex;
            gap: 3rem; /* Increased gap */
            margin-top: 2rem; /* Added space */
            padding: 1rem; /* Added padding */
            background: rgba(10, 10, 10, 0.5); /* Added background */
            border-radius: 2px; /* Added slight border radius */
            border-top: 1px solid rgba(0, 240, 255, 0.2); /* Added border */
            border-bottom: 1px solid rgba(0, 240, 255, 0.2); /* Added border */
        }
        
        .social-link {
            color: rgba(0, 240, 255, 0.85); /* Brighter color */
            text-decoration: none;
            transition: all 0.3s;
            font-size: 1.1rem; /* Increased size */
            letter-spacing: 0.15em; /* Increased letter spacing */
            text-transform: uppercase;
            position: relative;
            padding: 0.5rem 1rem;
            font-weight: 700; /* Added weight */
        }
        
        .social-link:first-child {
            color: rgba(0, 240, 255, 0.85); /* Brighter color */
        }
        
        .social-link:last-child {
            color: rgba(255, 0, 200, 0.85); /* Brighter color */
        }
        
        .social-link:first-child:hover {
            color: #00f0ff;
            transform: translateY(-3px); /* Increased movement */
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.6); /* Added glow */
        }
        
        .social-link:last-child:hover {
            color: #ff00c8;
            transform: translateY(-3px); /* Increased movement */
            text-shadow: 0 0 10px rgba(255, 0, 200, 0.6); /* Added glow */
        }
        
        .social-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px; /* Increased height */
            background: currentColor;
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s ease;
        }
        
        .social-link:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }
        
        /* Animations */
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        
        @keyframes textShadow {
            0% { text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.8), -0.025em -0.05em 0 rgba(0, 255, 0, 0.8), 0.025em 0.05em 0 rgba(0, 0, 255, 0.8); }
            14% { text-shadow: 0.05em 0 0 rgba(255, 0, 0, 0.8), -0.025em -0.05em 0 rgba(0, 255, 0, 0.8), 0.025em 0.05em 0 rgba(0, 0, 255, 0.8); }
            15% { text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.8), 0.025em 0.025em 0 rgba(0, 255, 0, 0.8), -0.05em -0.05em 0 rgba(0, 0, 255, 0.8); }
            49% { text-shadow: -0.05em -0.025em 0 rgba(255, 0, 0, 0.8), 0.025em 0.025em 0 rgba(0, 255, 0, 0.8), -0.05em -0.05em 0 rgba(0, 0, 255, 0.8); }
            50% { text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.8), 0.05em 0 0 rgba(0, 255, 0, 0.8), 0 -0.05em 0 rgba(0, 0, 255, 0.8); }
            99% { text-shadow: 0.025em 0.05em 0 rgba(255, 0, 0, 0.8), 0.05em 0 0 rgba(0, 255, 0, 0.8), 0 -0.05em 0 rgba(0, 0, 255, 0.8); }
            100% { text-shadow: -0.025em 0 0 rgba(255, 0, 0, 0.8), -0.025em -0.025em 0 rgba(0, 255, 0, 0.8), -0.025em -0.05em 0 rgba(0, 0, 255, 0.8); }
        }
        
        @keyframes matrixRain {
            0% { top: -50%; }
            100% { top: 110%; }
        }
        
        /* Random flicker animation */
        @keyframes flicker {
            0% { opacity: 1; }
            3% { opacity: 0.8; }
            6% { opacity: 1; }
            7% { opacity: 0.9; }
            9% { opacity: 1; }
            11% { opacity: 0.6; }
            14% { opacity: 1; }
            50% { opacity: 1; }
            52% { opacity: 0.8; }
            54% { opacity: 1; }
            100% { opacity: 1; }
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 2rem;
                gap: 2rem;
            }
            
            .logo {
                font-size: 3.2rem;
                margin-bottom: 2rem;
            }
            
            .march-text {
                font-size: 1.6rem;
                letter-spacing: 0.2em;
            }
            
            .main-content {
                gap: 3rem;
            }
            
            .countdown {
                gap: 1.2rem;
            }
            
            .countdown-value {
                font-size: 2.8rem;
            }
            
            .social-links {
                flex-direction: column;
                gap: 1.2rem;
                align-items: center;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 1.5rem;
                gap: 1.5rem;
            }
            
            .logo {
                font-size: 2.5rem;
                margin-bottom: 1.5rem;
            }
            
            .march-text {
                font-size: 1.2rem;
                letter-spacing: 0.15em;
            }
            
            .main-content {
                gap: 2rem;
            }
            
            .countdown {
                gap: 0.7rem;
            }
            
            .countdown-value {
                font-size: 2rem;
            }
            
            .countdown-value-box {
                padding: 0.75rem;
            }
            
            .countdown-label {
                font-size: 0.75rem;
            }
            
            .video-caption {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <div class="bg-gradient"></div>
    <div class="matrix-container">
        <div class="matrix-code"></div>
    </div>
    <div class="scanlines"></div>
    <div class="glitch-overlay"></div>
    
    <div class="container">
        <div class="logo">@moyassin</div>
        
        <div class="main-content">
            <div class="march-text">
                <div class="march-glow"></div>
                <span>march is for locking in</span>
            </div>
            
            <div class="countdown">
                <div class="countdown-item">
                    <div class="countdown-value-container">
                        <div class="countdown-glow"></div>
                        <div class="countdown-value-box">
                            <div id="days" class="countdown-value">00</div>
                        </div>
                        <div class="countdown-border"></div>
                    </div>
                    <div class="countdown-label">DAYS</div>
                </div>
                
                <div class="countdown-item">
                    <div class="countdown-value-container">
                        <div class="countdown-glow"></div>
                        <div class="countdown-value-box">
                            <div id="hours" class="countdown-value">00</div>
                        </div>
                        <div class="countdown-border"></div>
                    </div>
                    <div class="countdown-label">HOURS</div>
                </div>
                
                <div class="countdown-item">
                    <div class="countdown-value-container">
                        <div class="countdown-glow"></div>
                        <div class="countdown-value-box">
                            <div id="minutes" class="countdown-value">00</div>
                        </div>
                        <div class="countdown-border"></div>
                    </div>
                    <div class="countdown-label">MIN</div>
                </div>
                
                <div class="countdown-item">
                    <div class="countdown-value-container">
                        <div class="countdown-glow"></div>
                        <div class="countdown-value-box">
                            <div id="seconds" class="countdown-value">00</div>
                        </div>
                        <div class="countdown-border"></div>
                    </div>
                    <div class="countdown-label">SEC</div>
                </div>
            </div>
            
            <div class="video-container">
                <div class="video-glow"></div>
                <div class="video-wrapper">
                    <iframe 
                        src="https://www.youtube.com/embed/ma1pD7ugMb8?si=fa0lHG8vg8q6ez2I&autoplay=1&mute=1&loop=1&playlist=ma1pD7ugMb8&controls=0&showinfo=0" 
                        title="Grimes - Genesis" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen
                    ></iframe>
                    <div class="video-overlay"></div>
                    <div class="video-border-top"></div>
                    <div class="video-border-bottom"></div>
                </div>
                <div class="video-caption">TRANSCEND THE SIMULATION</div>
            </div>
        </div>
        
        <div class="social-links">
            <a href="https://facebook.com/moyassin" class="social-link" target="_blank" rel="noopener noreferrer">
                fb.com/moyassin
            </a>
            <a href="https://tiktok.com/@moyassin" class="social-link" target="_blank" rel="noopener noreferrer">
                tiktok.com/@moyassin
            </a>
        </div>
    </div>
    
    <script>
        // Set the countdown date to April 1, 2025
        const countdownDate = new Date("April 1, 2025 00:00:00").getTime();
        
        // Update the countdown every second
        const countdown = setInterval(function() {
            // Get current date and time
            const now = new Date().getTime();
            
            // Calculate the time remaining
            const distance = countdownDate - now;
            
            // Calculate days, hours, minutes, and seconds
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            
            // Display the results with leading zeros
            document.getElementById("days").innerHTML = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerHTML = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerHTML = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerHTML = seconds < 10 ? "0" + seconds : seconds;
            
            // If the countdown is finished, display a message
            if (distance < 0) {
                clearInterval(countdown);
                document.getElementById("days").innerHTML = "00";
                document.getElementById("hours").innerHTML = "00";
                document.getElementById("minutes").innerHTML = "00";
                document.getElementById("seconds").innerHTML = "00";
            }
        }, 1000);
        
        // Enhanced glitch effect - more frequent and random
        function randomGlitch() {
            const glitchOverlay = document.querySelector('.glitch-overlay');
            glitchOverlay.style.opacity = '0.3';
            
            setTimeout(function() {
                glitchOverlay.style.opacity = '0';
            }, 200);
            
            // Set next glitch at random interval between 3-7 seconds
            setTimeout(randomGlitch, Math.random() * 4000 + 3000);
        }
        
        // Start random glitches
        randomGlitch();
        
        // Add flicker effect to the logo periodically
        setInterval(function() {
            const logo = document.querySelector('.logo');
            logo.style.animation = 'flicker 2s ease forwards';
            
            setTimeout(function() {
                logo.style.animation = 'textShadow 1.5s infinite';
            }, 2000);
        }, 10000);
    </script>
    
    <!-- Vercel Analytics -->
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</body>
