<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@moyassin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Space Mono', monospace;
            background-color: #050505;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        /* Container */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            padding: 4rem 2.5rem;
            position: relative;
            z-index: 10;
            gap: 3rem;
        }
        
        /* Background effects */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0, 255, 255, 0.05) 0%, transparent 70%);
            z-index: 1;
        }
        
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 2px,
                rgba(0, 240, 255, 0.02) 2px,
                rgba(0, 240, 255, 0.02) 4px
            );
            pointer-events: none;
            z-index: 2;
        }
        
        /* Logo */
        .logo-section {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }
        
        .logo {
            font-size: 3.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #00f0ff, #ff00c8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }
        
        /* Main content */
        .main-content {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            gap: 5rem;
        }
        
        /* Title text */
        .title-container {
            position: relative;
            text-align: center;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }
        
        .title-text {
            position: relative;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
            text-align: center;
            padding: 0.5rem 1rem;
            background: linear-gradient(to right, #00f0ff, #ff00c8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.3);
        }
        
        .title-separator {
            color: #00f0ff;
            animation: pulse 2s infinite alternate;
        }
        
        @keyframes pulse {
            0% { opacity: 0.7; }
            100% { opacity: 1; }
        }
        
        .mission-statement {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.9);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            position: relative;
            display: inline-block;
            padding: 0.8rem 2rem;
            border-left: 2px solid rgba(0, 240, 255, 0.4);
            border-right: 2px solid rgba(255, 0, 200, 0.4);
        }
        
        .subtitle {
            font-size: 1.2rem;
            text-align: center;
            margin-top: 1.5rem;
            color: rgba(255, 255, 255, 0.8);
            max-width: 700px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            position: relative;
            display: inline-block;
        }
        
        .subtitle::before {
            content: '[';
            color: #00f0ff;
            margin-right: 0.5rem;
            font-weight: bold;
        }
        
        .subtitle::after {
            content: ']';
            color: #ff00c8;
            margin-left: 0.5rem;
            font-weight: bold;
        }
        
        /* Countdown */
        .countdown-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        
        .countdown {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2.5rem;
            width: 100%;
            max-width: 700px;
        }
        
        .countdown-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        
        .countdown-value-container {
            position: relative;
            width: 100%;
        }
        
        .countdown-value-box {
            background-color: #0a0a0a;
            border: 1px solid rgba(0, 240, 255, 0.3);
            position: relative;
            z-index: 1;
            padding: 1.5rem;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.15);
            border-radius: 4px;
        }
        
        .countdown-value {
            font-size: 3rem;
            font-weight: 700;
            color: white;
            text-align: center;
            width: 100%;
            position: relative;
        }
        
        .countdown-border {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background-color: #00f0ff;
            z-index: 2;
        }
        
        .countdown-label {
            font-size: 0.875rem;
            letter-spacing: 0.2em;
            color: rgba(0, 240, 255, 0.8);
        }
        
        /* Video section */
        .video-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }
        
        .video-container {
            position: relative;
            width: 100%;
            max-width: 700px;
        }
        
        .video-wrapper {
            position: relative;
            aspect-ratio: 16 / 9;
            width: 100%;
            background-color: #000;
            border: 1px solid rgba(0, 240, 255, 0.3);
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
            cursor: pointer;
            border-radius: 4px;
        }
        
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        
        .video-thumbnail {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.ytimg.com/vi/rm7UdTLKt5Y/hqdefault.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }
        
        .video-thumbnail:hover {
            opacity: 0.8;
        }
        
        .play-button {
            width: 80px;
            height: 80px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }
        
        .play-button:hover {
            background-color: rgba(0, 240, 255, 0.3);
            transform: scale(1.1);
        }
        
        .play-button::after {
            content: '';
            width: 0;
            height: 0;
            border-top: 20px solid transparent;
            border-left: 32px solid white;
            border-bottom: 20px solid transparent;
            margin-left: 7px;
        }
        
        .video-border-top {
            position: absolute;
            top: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(to right, transparent, #ff00c8, transparent);
        }
        
        .video-border-bottom {
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(to right, transparent, #00f0ff, transparent);
        }
        
        .video-caption {
            text-align: center;
            color: #00f0ff;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-size: 1rem;
        }

        
        /* Social links */
        .footer-section {
            width: 100%;
            margin-top: 3rem;
        }
        
        .social-links {
            display: flex;
            gap: 4rem;
            padding: 2rem 0;
            border-top: 1px solid rgba(0, 240, 255, 0.1);
            width: 100%;
            justify-content: center;
        }
        
        .social-link {
            color: rgba(0, 240, 255, 0.8);
            text-decoration: none;
            transition: color 0.3s, transform 0.3s;
            font-size: 1rem;
            letter-spacing: 0.1em;
            position: relative;
            padding: 0.5rem 1rem;
        }
        
        .social-link:first-child {
            color: rgba(0, 240, 255, 0.8);
        }
        
        .social-link:last-child {
            color: rgba(255, 0, 200, 0.8);
        }
        
        .social-link:first-child:hover {
            color: #00f0ff;
            transform: translateY(-2px);
        }
        
        .social-link:last-child:hover {
            color: #ff00c8;
            transform: translateY(-2px);
        }
        
        .social-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: currentColor;
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s ease;
        }
        
        .social-link:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 3rem 1.5rem;
                gap: 2.5rem;
            }
            
            .logo {
                font-size: 2.5rem;
            }
            
            .main-content {
                gap: 4rem;
            }
            
            .title-container {
                gap: 1.5rem;
            }
            
            .title-text {
                font-size: 1.3rem;
            }
            
            .subtitle {
                font-size: 1rem;
            }
            
            .countdown {
                gap: 1.5rem;
            }
            
            .countdown-value {
                font-size: 2.5rem;
            }
            
            .countdown-value-box {
                padding: 1.2rem;
            }
            
            .social-links {
                flex-direction: column;
                gap: 1.5rem;
                align-items: center;
                padding: 1.5rem 0;
            }
            
            .play-button {
                width: 60px;
                height: 60px;
            }
            
            .play-button::after {
                border-top: 15px solid transparent;
                border-left: 24px solid white;
                border-bottom: 15px solid transparent;
                margin-left: 5px;
            }
            
            .mission-statement {
                font-size: 1rem;
                padding: 0.6rem 1.5rem;
            }
            
            .video-section {
                gap: 1.5rem;
            }
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 2.5rem 1rem;
                gap: 2rem;
            }
            
            .logo {
                font-size: 2rem;
            }
            
            .main-content {
                gap: 3rem;
            }
            
            .title-container {
                gap: 1rem;
            }
            
            .title-text {
                font-size: 1rem;
                letter-spacing: 0.05em;
            }
            
            .subtitle {
                font-size: 0.9rem;
            }
            
            .countdown {
                gap: 0.8rem;
            }
            
            .countdown-item {
                gap: 0.7rem;
            }
            
            .countdown-value {
                font-size: 1.8rem;
            }
            
            .countdown-value-box {
                padding: 0.75rem;
            }
            
            .countdown-label {
                font-size: 0.7rem;
            }
            
            .video-caption {
                font-size: 0.8rem;
            }
            
            .play-button {
                width: 50px;
                height: 50px;
            }
            
            .play-button::after {
                border-top: 12px solid transparent;
                border-left: 20px solid white;
                border-bottom: 12px solid transparent;
                margin-left: 4px;
            }
            
            .mission-statement {
                font-size: 0.9rem;
                padding: 0.5rem 1rem;
                border-left-width: 1px;
                border-right-width: 1px;
            }
            
            .video-section {
                gap: 1rem;
            }
        }
    </style>
    <!-- Vercel Analytics Script -->
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="scanlines"></div>
    
    
    <div class="container">
        <div class="logo-section">
            <div class="logo">@moyassin</div>
        </div>
        
        <div class="main-content">
            <div class="title-container">
                <div class="title-text">
                    Locked in ⟁⟁⟁ Countdown to April 6th
                </div>
                
                <div class="mission-statement">
                    mission: build excellence
                </div>
            </div>
            
            <div class="countdown-section">
                <div class="countdown">
                    <div class="countdown-item">
                        <div class="countdown-value-container">
                            <div class="countdown-value-box">
                                <div id="days" class="countdown-value">00</div>
                            </div>
                            <div class="countdown-border"></div>
                        </div>
                        <div class="countdown-label">DAYS</div>
                    </div>
                    
                    <div class="countdown-item">
                        <div class="countdown-value-container">
                            <div class="countdown-value-box">
                                <div id="hours" class="countdown-value">00</div>
                            </div>
                            <div class="countdown-border"></div>
                        </div>
                        <div class="countdown-label">HOURS</div>
                    </div>
                    
                    <div class="countdown-item">
                        <div class="countdown-value-container">
                            <div class="countdown-value-box">
                                <div id="minutes" class="countdown-value">00</div>
                            </div>
                            <div class="countdown-border"></div>
                        </div>
                        <div class="countdown-label">MIN</div>
                    </div>
                    
                    <div class="countdown-item">
                        <div class="countdown-value-container">
                            <div class="countdown-value-box">
                                <div id="seconds" class="countdown-value">00</div>
                            </div>
                            <div class="countdown-border"></div>
                        </div>
                        <div class="countdown-label">SEC</div>
                    </div>
                </div>
            </div>
            
            <div class="video-section">
                <div class="video-container">
                    <div class="video-wrapper" id="videoWrapper">
                        <div id="videoThumbnail" class="video-thumbnail">
                            <div class="play-button"></div>
                        </div>
                        <div id="videoPlayer"></div>
                        <div class="video-border-top"></div>
                        <div class="video-border-bottom"></div>
                    </div>
                </div>
                <div class="video-caption">lock in // accelerate // hack the simulation</div>
            </div>
        </div>
        
        <div class="footer-section">
            <div class="social-links">
                <a href="https://facebook.com/moyassin" class="social-link" target="_blank" rel="noopener noreferrer">
                    fb.com/moyassin
                </a>
                <a href="https://tiktok.com/@moyassin" class="social-link" target="_blank" rel="noopener noreferrer">
                    tiktok.com/@moyassin
                </a>
            </div>
        </div>
    </div>
    
    <script>
        // Set the countdown date to April 7, 2025 at midnight (to include all of April 6th)
        const countdownDate = new Date("April 7, 2025 00:00:00").getTime();
        
        // Update the countdown every second
        const countdown = setInterval(function() {
            // Get current date and time
            const now = new Date().getTime();
            
            // Calculate the time remaining
            const distance = countdownDate - now;
            
            // Calculate days, hours, minutes, and seconds
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            
            // Display the results with leading zeros
            document.getElementById("days").innerHTML = days < 10 ? "0" + days : days;
            document.getElementById("hours").innerHTML = hours < 10 ? "0" + hours : hours;
            document.getElementById("minutes").innerHTML = minutes < 10 ? "0" + minutes : minutes;
            document.getElementById("seconds").innerHTML = seconds < 10 ? "0" + seconds : seconds;
            
            // If the countdown is finished, display a message
            if (distance < 0) {
                clearInterval(countdown);
                document.getElementById("days").innerHTML = "00";
                document.getElementById("hours").innerHTML = "00";
                document.getElementById("minutes").innerHTML = "00";
                document.getElementById("seconds").innerHTML = "00";
            }
        }, 1000);
        
        // Video player functionality - Play directly in the container
        document.getElementById('videoWrapper').addEventListener('click', function() {
            const videoThumbnail = document.getElementById('videoThumbnail');
            const videoPlayer = document.getElementById('videoPlayer');
            
            // Hide thumbnail
            videoThumbnail.style.display = 'none';
            
            // Create iframe with the correct YouTube embed URL and parameters to fill the container
            videoPlayer.innerHTML = `<iframe 
                src="https://www.youtube.com/embed/rm7UdTLKt5Y?autoplay=1&modestbranding=1&rel=0&showinfo=0&controls=1&fs=1&color=white&iv_load_policy=3&start=0&vq=hd1080" 
                title="Kanye West, Ty Dolla Sign - Stars (Live at UBS Arena)" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                allowfullscreen
                style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none;"
            ></iframe>`;
        });
    </script>
</body>
</html>
