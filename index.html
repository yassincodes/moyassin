    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;

            padding: 60px 24px;
            line-height: 1.7;
            background: #fafafa;

            color: #111;

            transition: border-color 0.2s ease;
        }

        a:hover {
            border-bottom-color: #666;
            color: #666;
        }

        .announcement {
            margin: 2rem 0;
            font-size: 1.2rem;
            font-weight: 500;
        }

        @media (max-width: 600px) {
            body {
                padding: 40px 20px;
            }
